<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIXA | Contact</title>
  <meta name="description" content="Contact MIXA.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-body">
  <header class="site-header">
    <nav class="container nav">
      <a href="index.html" class="logo">MIXA<span>.</span></a>
      <ul class="nav-links">
        <li><a href="projects.html">Projects</a></li>
        <li><a href="about.html">About</a></li>
        <li><a class="active" href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-hero">
      <div class="container page-hero-content">
        <p class="eyebrow">Contact</p>
        <h1>Let's discuss your next project.</h1>
        <p class="page-copy">For freelance work, collaboration, or a full-time role, send a quick message.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <form class="contact-form" action="#" method="post">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Your name" required>

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required>

          <label for="subject">Subject</label>
          <input id="subject" name="subject" type="text" placeholder="Project inquiry" required>

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Tell me about your project..." required></textarea>

          <button class="btn btn-primary" type="submit">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <div>
        <p class="eyebrow">Start A Project</p>
        <h2>Need a developer for your next build?</h2>
      </div>
      <div class="footer-actions">
        <a class="btn btn-primary" href="mailto:you@example.com">Email Directly</a>
        <a class="btn btn-outline" href="projects.html">See My Work</a>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
